  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --bg:#F6F6F6; --surface:#FFFFFF; --surface-2:#F0F1F1;\n  --ink:#080D0F; --muted:#768083; --faint:#9AA0A2;\n  --line:rgba(8,13,15,.09); --line-2:rgba(8,13,15,.16);\n  --green:#08EF46; --green-ink:#0A8F33; --green-soft:rgba(8,239,70,.12);\n  --red:#FB301A; --red-soft:rgba(251,48,26,.10);\n  --r:12px; --r-lg:18px; --pill:68px;\n  --display:'Geist',sans-serif; --body:'Inter',sans-serif; --mono:'Geist Mono',monospace;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nbody{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}\na{color:inherit;text-decoration:none}\nh1,h2,h3{font-family:var(--display);font-weight:600;letter-spacing:-.025em;line-height:1.1}\n::selection{background:var(--green);color:var(--ink)}\n.wrap{max-width:1280px;margin:0 auto;padding:0 24px}\n.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}\n.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green-ink)}\n:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:4px}\n.mk{display:inline-block;width:16px;height:20px;color:currentColor}\n.mk svg{display:block;width:100%;height:100%}\n\n/* buttons */\n.btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--display);font-weight:500;font-size:15px;padding:13px 24px;border-radius:var(--pill);border:1px solid transparent;cursor:pointer;transition:.18s ease;white-space:nowrap}\n.btn-pri{background:var(--ink);color:#fff}\n.btn-pri:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(8,13,15,.18)}\n.btn-pri.ci{padding:6px 6px 6px 24px;gap:16px}\n.btn-pri .circ{width:38px;height:38px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.btn-pri .circ svg{width:15px;height:15px}\n.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2)}\n.btn-ghost:hover{background:var(--surface);border-color:var(--ink)}\n.btn-green{background:var(--green);color:var(--ink)}\n.btn-green:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(8,239,70,.28)}\n.btn-sm{padding:9px 18px;font-size:14px}\n\n/* banner */\n.banner{background:var(--ink);color:#fff;font-size:13.5px;text-align:center;padding:10px 16px;font-family:var(--body)}\n.banner b{font-family:var(--display);font-weight:600}\n.banner .cd{font-family:var(--mono);color:var(--green);font-weight:500}\n\n/* nav */\nheader.nav{position:sticky;top:0;z-index:50;background:rgba(246,246,246,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}\n.nav-in{display:flex;align-items:center;gap:28px;height:66px;position:relative}\n.logo{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.03em;display:flex;align-items:center;gap:9px;color:var(--ink)}\n.nav-links{display:flex;gap:26px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}\n.nav-links a{font-size:14.5px;color:var(--muted);transition:.15s}\n.nav-links a:hover{color:var(--ink)}\n.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}\n.nav-toggle{display:none;background:none;border:0;color:var(--ink);font-size:24px;cursor:pointer}\n\n/* hero */\n.hero{position:relative;padding:88px 0 72px}\n.hero::before{content:\"\";position:absolute;inset:0;background:radial-gradient(680px 380px at 50% -6%,rgba(8,239,70,.10),transparent 68%);pointer-events:none}\n.hero-in{position:relative;text-align:center;max-width:780px;margin:0 auto}\n.hero .star{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line-2);border-radius:99px;padding:6px 15px;margin-bottom:20px}\n.hero h1{font-size:clamp(36px,5.6vw,62px);font-weight:500;letter-spacing:-.03em}\n.hero h1 .grad{display:inline-flex;align-items:center;gap:.18em}\n.hero h1 .grad .mk{width:.62em;height:.78em;color:var(--green-ink);transform:translateY(.04em)}\n.hero p.sub{color:var(--muted);font-size:clamp(16px,2vw,19px);margin:22px auto 32px;max-width:548px;font-family:var(--display);font-weight:400;letter-spacing:-.01em}\n.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}\n.tp{display:flex;align-items:center;justify-content:center;gap:11px;flex-wrap:wrap;margin-top:24px}\n.tp .exc{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink)}\n.tp .stars{display:flex;gap:3px}\n.tp .stars i{width:25px;height:25px;background:#00B67A;display:flex;align-items:center;justify-content:center}\n.tp .stars i svg{width:17px;height:17px;fill:#fff}\n.tp .rev{font-family:var(--body);font-weight:500;font-size:14.5px;color:var(--ink);text-decoration:underline;text-underline-offset:2px}\n.tp .tpl{display:inline-flex;align-items:center;gap:5px;font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink)}\n.tp .tpl svg{width:18px;height:18px;fill:#00B67A}\n\n/* ticker */\n.ticker{margin:48px auto 0;max-width:880px;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}\n.tk{background:var(--surface);padding:22px 16px;text-align:center}\n.tk .v{font-family:var(--display);font-size:clamp(24px,3vw,32px);font-weight:600;letter-spacing:-.03em}\n.tk .v.up{color:var(--green-ink)}\n.tk .l{font-size:12px;color:var(--muted);margin-top:7px;letter-spacing:.02em;font-family:var(--mono)}\n\n/* what makes different — climb hero + cards */\n.vdiff{margin:84px auto 0}\n/* announcement slider */\n.climb-slider{position:relative;border-radius:24px;overflow:hidden;background:var(--surface);border:1px solid var(--line);margin-bottom:18px}\n.climb-track{display:flex;transition:transform .55s cubic-bezier(.4,.1,.2,1)}\n.climb-slide{flex:0 0 100%;display:grid;grid-template-columns:1.05fr .95fr;min-height:404px}\n.cs-left{padding:48px 48px 56px;display:flex;flex-direction:column;justify-content:center}\n.cs-badge{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:99px;padding:7px 13px;margin-bottom:20px}\n.cs-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(8,239,70,.25)}\n.cs-left h2{font-size:clamp(32px,4.2vw,50px);font-weight:500;letter-spacing:-.03em;color:var(--ink);line-height:1.02;max-width:8.5em}\n.cs-sub{color:var(--muted);margin-top:16px;font-family:var(--display);font-size:16px;letter-spacing:-.01em;max-width:440px;line-height:1.45}\n.cs-cta{margin-top:28px;align-self:flex-start}\n.cs-right{position:relative;background:var(--surface-2);overflow:hidden}\n.cs-right .ph{position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(8,13,15,.045) 0 12px,transparent 12px 24px);display:flex;align-items:center;justify-content:center}\n.cs-right .ph span{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--faint);text-transform:uppercase;background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:8px 15px}\n/* slider nav */\n.climb-nav{position:absolute;right:22px;bottom:22px;display:flex;align-items:center;gap:18px;z-index:6}\n.climb-dots{display:flex;gap:7px;align-items:center}\n.cdot{width:8px;height:8px;border-radius:99px;border:0;padding:0;background:var(--line-2);cursor:pointer;transition:.22s ease}\n.cdot.active{width:26px;background:var(--ink)}\n.climb-arrows{display:flex;gap:8px}\n.carrow{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:.18s ease}\n.carrow:hover{background:var(--ink);color:#fff;border-color:var(--ink)}\n.carrow svg{width:16px;height:16px}\n.vdiff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}\n.vcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;text-align:left}\n.vcard h3{font-size:19px;font-weight:600;margin-bottom:11px;letter-spacing:-.02em;line-height:1.15}\n.vcard p{color:var(--muted);font-size:14px;line-height:1.5}\n\n/* sections */\nsection{padding:84px 0;position:relative}\n.sec-head{text-align:center;max-width:600px;margin:0 auto 48px}\n.sec-head h2{font-size:clamp(27px,3.6vw,40px);margin-top:14px;font-weight:500;letter-spacing:-.03em}\n.sec-head p{color:var(--muted);margin-top:14px}\n.live-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);border:1px solid var(--line-2);border-radius:99px;padding:7px 14px;margin-bottom:4px}\n.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(8,239,70,.5);animation:livePulse 1.8s ease-out infinite}\n@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(8,239,70,.5)}70%{box-shadow:0 0 0 7px rgba(8,239,70,0)}100%{box-shadow:0 0 0 0 rgba(8,239,70,0)}}\n\n/* powered by */\n.powered{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:26px}\n.powered .sep{width:100%;max-width:880px;height:1px;background:var(--line)}\n.powered .row{display:flex;align-items:center;justify-content:center;gap:clamp(24px,5vw,52px);flex-wrap:wrap}\n.powered .row img{height:24px;width:auto;opacity:.78;transition:opacity .15s}\n.powered .row img:hover{opacity:1}\n.powered .row .wm{font-family:var(--display);font-weight:600;font-size:21px;letter-spacing:-.02em;color:var(--ink);opacity:.78;transition:opacity .15s}\n.powered .row .wm:hover{opacity:1}\n\n/* steps */\n.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch}\n.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;displ  state={type:'2step',phase:0};\n  var tiers=document.getElementById('ptiers');\n  var phaseWrap=document.getElementById('pphase');\n  var typeTabs=document.querySelectorAll('#ptype .ptab');\n  if(!tiers||!phaseWrap)return;\n  function pvCls(v){return (v==='N/A'||v==='\\u2014')?' pv-muted':(v==='\\u2713'?' pv-yes':'');}\n  function rows(rs,ph){return rs.map(function(r){var v=r[1][ph];return '<li class=\"prow\"><span class=\"pl\">'+r[0]+'<\u002Fspan><span class=\"pv'+pvCls(v)+'\">'+v+'<\u002Fspan><\u002Fli>';}).join('');}\n  function render(){\n    var d=DATA[state.type];\n    if(state.phase>=d.phases.length)state.phase=0;\n    typeTabs.forEach(function(t){t.classList.toggle('active',t.getAttribute('data-type')===state.type);});\n    phaseWrap.innerHTML=d.phases.map(function(p,i){return '<button type=\"button\" class=\"'+(i===state.phase?'active':'')+'\" data-phase=\"'+i+'\">'+p.name+'<\u002Fbutton>';}).join('');\n    var front=d.rules.slice(0,4),back=d.rules.slice(4),pn=d.phases[state.phase].name;\n    tiers.innerHTML=SIZES.map(function(s){\n      var bc=s.feat?'btn-green':'btn-ghost';\n      return '<div class=\"tier'+(s.feat?' feat':'')+'\"><div class=\"tier-flip\">'\n        +'<div class=\"tier-face front\"><div class=\"badge\">'+(s.badge||'')+'<\u002Fdiv><div class=\"size\">'+s.label+'<\u002Fdiv><div class=\"price\"><s>'+s.old+'<\u002Fs>'+s.now+'<\u002Fdiv>'\n        +'<ul class=\"plist\">'+rows(front,state.phase)+'<\u002Ful>'\n        +'<div class=\"flip-foot\"><button type=\"button\" class=\"flip-link\" data-flip=\"open\">View Rules<\u002Fbutton><a href=\"#\" class=\"btn '+bc+' pick\">Start Now<\u002Fa><\u002Fdiv><\u002Fdiv>'\n        +'<div class=\"tier-face back\"><div class=\"back-head\">'+pn+' \\u00b7 full rules<\u002Fdiv><div class=\"back-title\">'+s.label+'<\u002Fdiv>'\n        +'<ul class=\"plist\">'+rows(back,state.phase)+'<\u002Ful>'\n        +'<div class=\"flip-foot\"><button type=\"button\" class=\"flip-link\" data-flip=\"close\">Back<\u002Fbutton><a href=\"#\" class=\"btn '+bc+' pick\">Start Now<\u002Fa><\u002Fdiv><\u002Fdiv>'\n        +'<\u002Fdiv><\u002Fdiv>';\n    }).join('');\n  }\n  typeTabs.forEach(function(t){t.addEventListener('click',function(){state.type=t.getAttribute('data-type');state.phase=0;render();});});\n  phaseWrap.addEventListener('click',function(e){var b=e.target.closest('button[data-phase]');if(!b)return;state.phase=parseInt(b.getAttribute('data-phase'),10);render();});\n  tiers.addEventListener('click',function(e){var b=e.target.closest('.flip-link');if(!b)return;var tier=b.closest('.tier');tier.classList.toggle('flipped',b.getAttribute('data-flip')==='open');});\n  render();\n})();\ndocument.getElementById('year').textContent = new Date().getFullYear();\n\n(function(){\n  var target = new Date().getTime() + (4*24+12)*3600*1000;\n  var el = document.getElementById('countdown');\n  function tick(){\n    var d = target - Date.now(); if(d<0) d=0;\n    var dd=Math.floor(d/86400000), hh=Math.floor(d%86400000/3600000),\n        mm=Math.floor(d%3600000/60000), ss=Math.floor(d%60000/1000);\n    el.textContent = dd+'d '+hh+'h '+mm+'m '+ss+'s';\n  }\n  tick(); setInterval(tick,1000);\n})();\n\n(function(){\n  var track=document.getElementById('climbTrack');\n  if(!track) return;\n  var slides=track.children, n=slides.length, i=0;\n  var dotsWrap=document.getElementById('climbDots'), timer;\n  for(var d=0;d<n;d++){\n    (function(idx){\n      var b=document.createElement('button');\n      b.type='button'; b.className='cdot'+(idx===0?' active':'');\n      b.setAttribute('role','tab'); b.setAttribute('aria-label','Slide '+(idx+1));\n      b.addEventListener('click',function(){go(idx);restart();});\n      dotsWrap.appendChild(b);\n    })(d);\n  }\n  var dots=dotsWrap.children;\n  function go(x){\n    i=(x+n)%n;\n    track.style.transform='translateX('+(-i*100)+'%)';\n    for(var k=0;k<n;k++) dots[k].classList.toggle('active',k===i);\n  }\n  function restart(){ clearInterval(timer); timer=setInterval(function(){go(i+1)},6000); }\n  document.querySelectorAll('.carrow').forEach(function(a){\n    a.addEventListener('click',function(){ go(i+parseInt(a.dataset.dir,10)); restart(); });\n  });\n  restart();\n})();\n\ndocument.querySelectorAll('.q-btn').forEach(function(b){\n  b.addEventListener('click',function(){\n    var item=b.parentElement, ans=item.querySelector('.q-ans');\n    var open=item.classList.toggle('open');\n    ans.style.maxHeight = open ? ans.scrollHeight+'px' : '0';\n  });\n});\n\n(function(){\n  var tabs=document.getElementById('tmodTabs');\n  if(!tabs)return;\n  var btns=tabs.querySelectorAll('.tmod-tab');\n  var panels=document.querySelectorAll('.tmod-panel');\n  tabs.addEventListener('click',function(e){\n    var b=e.target.closest('.tmod-tab'); if(!b)return;\n    var t=b.getAttribute('data-tab');\n    btns.forEach(function(x){x.classList.toggle('active',x===b);});\n    panels.forEach(function(p){p.classList.toggle('active',p.getAttribute('data-panel')===t);});\n  });\n})();\n\nif(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){\n  var io=new IntersectionObserver(function(es){\n    es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });\n  },{threshold:.12});\n  document.querySelectorAll('.reveal').forEach(function(n){io.observe(n)});\n}else{\n  document.querySelectorAll('.reveal').forEach(function(n){n.classList.add('in')});\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
